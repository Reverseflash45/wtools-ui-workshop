<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Personal Information</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/store.css">
    <link rel="stylesheet" href="assets/css/academy.css">
</head>
<body>
    <div style="padding: 20px 20px 100px 20px;">
        <header class="page-header">
            <a href="profile.html" style="font-size: 20px;">←</a>
            <h2 class="page-title">Personal Information</h2>
        </header>

        <form action="profile.html">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" value="Rafi Fernandito">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" value="rafi.fernandito@email.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="form-control" value="+62 812-3456-7890">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" class="form-control" value="1997-03-15" style="color-scheme: dark;">
            </div>
            
            <div class="form-group">
                <label>Gender</label>
                <div class="gender-select">
                    <div class="gender-option active">Male</div>
                    <div class="gender-option">Female</div>
                    <div class="gender-option">Other</div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 32px;">
                <label>Security</label>
                <button type="button" class="btn" style="background-color: var(--bg-card); color: var(--primary); border: 1px solid var(--primary); text-align: left; display: flex; justify-content: space-between; align-items: center;">
                    Change Password
                    <span>›</span>
                </button>
            </div>
        </form>

        <div class="bottom-action-bar" style="justify-content: center;">
            <button class="btn btn-primary" style="width: 100%;" onclick="window.location.href='profile.html'">Save Changes</button>
        </div>
    </div>
</body>
</html>
