<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Personal Information</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body { background-color: var(--bg-dark, #121212); color: var(--text-main, #ffffff); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background-color: var(--bg-card, #1e1e1e); border-right: 1px solid var(--border-color, #333); display: flex; flex-direction: column; padding: 24px 0; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { font-size: 24px; font-weight: 800; color: var(--primary, #e60000); padding: 0 24px; margin-bottom: 40px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; font-size: 15px; font-weight: 600; border-radius: 8px; transition: all 0.2s ease; }
        .nav-item:hover, .nav-item.active { background-color: rgba(230, 0, 0, 0.1); color: var(--primary); }
        .main-content { margin-left: 240px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        
        .form-wrapper { width: 100%; max-width: 600px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
        .btn-back { color: var(--text-main); background-color: var(--bg-card); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border-color); text-decoration: none; }
        
        .form-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 32px; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 10px; }
        .form-control { width: 100%; padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white; font-size: 15px; box-sizing: border-box; font-family: inherit; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        
        .gender-select { display: flex; gap: 16px; }
        .gender-option { flex: 1; padding: 14px; text-align: center; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .gender-option.active { background: rgba(230,0,0,0.1); border-color: var(--primary); color: var(--primary); }
        
        .btn-primary { width: 100%; padding: 16px; font-weight: 800; font-size: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 16px; }
        .btn-change-pw { width: 100%; padding: 16px; background: var(--bg-dark); border: 1px solid var(--primary); color: var(--primary); font-weight: 700; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></a>
            <a href="profile.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg><span>Profile</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="form-wrapper">
            <header class="page-header">
                <a href="profile.html" class="btn-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
                <h2 style="margin:0; font-size: 24px; font-weight: 800;">Personal Information</h2>
            </header>

            <div class="form-card">
                <form action="profile.html">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" value="Rafi Fernandito">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" value="rafi.fernandito@email.com">
                    </div>
                    <div style="display: flex; gap: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Phone Number</label>
                            <input type="tel" class="form-control" value="+62 812-3456-7890">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Date of Birth</label>
                            <input type="date" class="form-control" value="1997-03-15" style="color-scheme: dark;">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Gender</label>
                        <div class="gender-select">
                            <div class="gender-option active">Male</div>
                            <div class="gender-option">Female</div>
                            <div class="gender-option">Other</div>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--border-color);">
                        <label>Security Settings</label>
                        <button type="button" class="btn-change-pw">
                            Change Password
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                    </div>

                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.querySelectorAll('.gender-option').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.gender-option').forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
