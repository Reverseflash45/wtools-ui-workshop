<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Verify OTP</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <main class="auth-container">
        
        <div id="otp-form-state">
            <a href="forgot-password.html" class="back-btn">←</a>
            <h2 style="font-size: 24px; margin-bottom: 8px;">Verify Code</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 32px;">We sent a 6-digit code to your email.</p>

            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
            </div>

            <p style="text-align: center; color: var(--text-muted); font-size: 12px; margin-bottom: 32px;">Didn't receive the code? <span style="color: var(--primary);">Resend (24 s)</span></p>

            <button class="btn btn-primary" onclick="showSuccess()">Verify</button>
        </div>

        <div id="otp-success-state" class="success-state">
            <div class="success-icon">
                <span style="color: white; font-size: 32px;">✓</span>
            </div>
            <h2 style="font-size: 20px; margin-bottom: 8px;">Verification Successful</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 32px;">Akun kamu berhasil diverifikasi.</p>
            <button class="btn btn-primary" onclick="window.location.href='home.html'">Continue</button>
        </div>

    </main>

    <script>
        function showSuccess() {
            document.getElementById('otp-form-state').style.display = 'none';
            document.getElementById('otp-success-state').style.display = 'flex';
        }
    </script>
</body>
</html>
