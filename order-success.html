<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Order Successful</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 24px;
            text-align: center;
        }
        .success-icon-large {
            width: 100px;
            height: 100px;
            background-color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            font-size: 48px;
            color: white;
        }
    </style>
</head>
<body>
    <main class="success-container">
        <div class="success-icon-large">✓</div>
        
        <h1 style="font-size: 24px; margin-bottom: 12px;">Order Successful!</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 32px;">Your items are being prepared.</p>
        
        <div style="background-color: var(--bg-card); width: 100%; border-radius: 12px; padding: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: left;">
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">Order Number</p>
                <h4 style="font-size: 14px;">#ORD-2026-001</h4>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">Total Amount</p>
                <h4 style="font-size: 14px; color: var(--primary);">Rp 1.191.000</h4>
            </div>
        </div>

        <button class="btn btn-primary" style="margin-bottom: 16px;" onclick="window.location.href='order-tracking.html'">Track Order</button>
        <button class="btn btn-outline" onclick="window.location.href='home.html'">Back to Home</button>
    </main>
</body>
</html>
