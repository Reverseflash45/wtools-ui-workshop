<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Kategori Artikel</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            background-color: var(--bg-dark, #121212);
            color: var(--text-main, #ffffff);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 240px;
            background-color: var(--bg-card, #1e1e1e);
            border-right: 1px solid var(--border-color, #333);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary, #e60000);
            padding: 0 24px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted, #aaaaaa);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main, #ffffff);
        }
        .nav-item.active {
            background-color: rgba(230, 0, 0, 0.1);
            color: var(--primary, #e60000);
        }
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 40px;
            background-color: var(--bg-dark, #121212);
            box-sizing: border-box;
        }
        .page-header {
            margin-bottom: 40px;
        }
        .page-title {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 8px 0;
        }
        .page-desc {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .category-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }
        .category-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }
        .category-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .category-info {
            padding: 24px;
        }
        .category-name {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .category-count {
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            margin: 0;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </a>
            <a href="store-trending.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <span>Store</span>
            </a>
            <a href="article-categories.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span>Academy</span>
            </a>
            <a href="wishlist.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                <span>Wishlist</span>
            </a>
            <a href="transaction-history.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span>Histori Transaksi</span>
            </a>
            <a href="profile.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">WTools Academy</h1>
            <p class="page-desc">Tingkatkan wawasan kebugaranmu melalui artikel edukasi terkurasi.</p>
        </header>

        <div class="category-grid">
            <a href="academy.html?cat=nutrition" class="category-card">
                <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=600&auto=format&fit=crop" alt="Nutrition" class="category-img">
                <div class="category-info">
                    <h2 class="category-name">Nutrition</h2>
                    <p class="category-count">12 Artikel Tersedia</p>
                </div>
            </a>

            <a href="academy.html?cat=training" class="category-card">
                <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=600&auto=format&fit=crop" alt="Training" class="category-img">
                <div class="category-info">
                    <h2 class="category-name">Training</h2>
                    <p class="category-count">24 Artikel Tersedia</p>
                </div>
            </a>

            <a href="academy.html?cat=recovery" class="category-card">
                <img src="https://images.unsplash.com/photo-1519824145371-296894a0daa9?w=600&auto=format&fit=crop" alt="Recovery" class="category-img">
                <div class="category-info">
                    <h2 class="category-name">Recovery</h2>
                    <p class="category-count">8 Artikel Tersedia</p>
                </div>
            </a>
        </div>
    </main>

</body>
</html>
