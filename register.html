<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Register</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <main class="auth-container">
        <a href="login.html" class="back-btn">← Create Account</a>

        <form action="home.html">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="form-control" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" class="form-control" placeholder="Confirm your password" required>
            </div>

            <div style="display: flex; gap: 8px; margin-bottom: 24px; font-size: 12px; color: var(--text-muted);">
                <input type="checkbox" required id="terms">
                <label for="terms">I agree to <span style="color: var(--primary);">Terms</span> & <span style="color: var(--primary);">Privacy</span></label>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        
        <p class="bottom-link">Already have an account? <a href="login.html">Login</a></p>
    </main>
</body>
</html>
