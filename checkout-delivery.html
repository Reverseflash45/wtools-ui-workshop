<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Delivery Details</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/store.css">
</head>
<body>
    <div class="store-container">
        <header class="page-header">
            <a href="cart.html" style="font-size: 20px;">←</a>
            <h2 class="page-title">Delivery Details</h2>
        </header>

        <div class="checkout-step">
            <span class="active">1 Cart</span>
            <span>—</span>
            <span class="active">2 Delivery</span>
            <span>—</span>
            <span>3 Payment</span>
        </div>

        <h3 class="section-title">Delivery Method</h3>
        <div class="payment-option active">
            <input type="radio" name="delivery" checked style="margin-right: 12px;">
            <div style="flex: 1;">
                <h4 style="font-size: 14px; margin-bottom: 4px;">Home Delivery</h4>
                <p style="font-size: 12px; color: var(--text-muted);">2-3 business days</p>
            </div>
            <span style="color: var(--primary); font-weight: bold; font-size: 14px;">Rp 40.000</span>
        </div>
        <div class="payment-option">
            <input type="radio" name="delivery" style="margin-right: 12px;">
            <div style="flex: 1;">
                <h4 style="font-size: 14px; margin-bottom: 4px;">Store Pickup</h4>
                <p style="font-size: 12px; color: var(--text-muted);">Available today</p>
            </div>
            <span style="color: var(--primary); font-weight: bold; font-size: 14px;">Free</span>
        </div>

        <h3 class="section-title" style="margin-top: 24px;">Delivery Information</h3>
        <form>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" value="Rafi Fernandito">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="form-control" value="+62 812-3456-7890">
            </div>
            <div class="form-group">
                <label>Full Address</label>
                <input type="text" class="form-control" value="123 Fitness Street, Apt 4B Downtown">
            </div>
            <div class="form-group">
                <label>Postal Code</label>
                <input type="text" class="form-control" value="10001">
            </div>
        </form>
    </div>

    <div class="bottom-action-bar" style="justify-content: center;">
        <button class="btn btn-primary" style="width: 100%;" onclick="window.location.href='checkout-payment.html'">Continue to Payment</button>
    </div>
</body>
</html>
