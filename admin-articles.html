    <main class="main-content">
        <header class="header-admin">
            <h1 class="admin-title">Kelola Artikel (Academy)</h1>
            <div class="admin-profile">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">A</div>
                <span style="font-size: 14px; font-weight: 600;">Admin Okabe</span>
            </div>
        </header>

        <div class="admin-panel-card">
            <div class="panel-header">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <input type="text" id="searchArticle" placeholder="Cari judul artikel..." style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white; width: 300px;">
                </div>
                <button class="btn-add" onclick="openModal()">+ Tulis Artikel</button>
            </div>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Thumbnail</th>
                        <th>Judul Artikel</th>
                        <th>Kategori</th>
                        <th>Tanggal Terbit</th>
                        <th>Views</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="articleTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="articleModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top: 0; margin-bottom: 20px;">Tulis Artikel</h3>
            <input type="hidden" id="articleId">
            <div class="form-group">
                <label>URL Gambar Thumbnail</label>
                <input type="text" id="articleImg" placeholder="https://example.com/thumb.jpg">
            </div>
            <div class="form-group">
                <label>Judul Artikel</label>
                <input type="text" id="articleTitle" required>
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="articleCategory">
                    <option value="NUTRITION">NUTRITION</option>
                    <option value="TRAINING">TRAINING</option>
                    <option value="RECOVERY">RECOVERY</option>
                </select>
            </div>
            <div class="form-group">
                <label>Isi Artikel</label>
                <textarea id="articleContent" rows="6" placeholder="Mulai menulis konten artikel di sini..." required></textarea>
            </div>
            <div class="form-group">
                <label>Tanggal Terbit</label>
                <input type="text" id="articleDate" placeholder="05 Juni 2026">
            </div>
            <div class="modal-actions">
                <button class="btn-add" style="background: #6c757d;" onclick="closeModal()">Batal</button>
                <button class="btn-add" onclick="saveArticle()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const initialArticles = [
            { id: 1, title: "Essential Nutrition and Diet Guide for Muscle Recovery", category: "NUTRITION", date: "02 Mei 2026", views: "1,204", content: "Kandungan protein sangat penting untuk mempercepat perbaikan sel otot setelah latihan...", img: "https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=120" },
            { id: 2, title: "How to Maintain Your Training Routine for Maximum Longevity", category: "TRAINING", date: "28 Apr 2026", views: "845", content: "Konsistensi adalah kunci utama dalam membangun massa tubuh bebas lemak (lean mass)...", img: "https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=120" },
            { id: 3, title: "Optimal Sleeping Patterns and Fiber Tissue Healing Science", category: "RECOVERY", date: "15 Apr 2026", views: "3,492", content: "Penelitian menunjukkan bahwa 7-8 jam tidur malam berkontribusi terhadap 80% proses pemulihan sentral...", img: "https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=120" }
        ];

        if (!localStorage.getItem('wtools_articles')) {
            localStorage.setItem('wtools_articles', JSON.stringify(initialArticles));
        }

        function getArticles() {
            return JSON.parse(localStorage.getItem('wtools_articles'));
        }

        function renderArticles(filterText = "") {
            const articles = getArticles();
            const tbody = document.getElementById('articleTableBody');
            tbody.innerHTML = "";

            const filtered = articles.filter(a => a.title.toLowerCase().includes(filterText.toLowerCase()));

            filtered.forEach(a => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${a.img}" style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px;" onerror="this.src='https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=120'"></td>
                    <td style="font-weight: 600;">${a.title}</td>
                    <td><span style="color: var(--primary); font-size: 12px; font-weight: 600;">${a.category}</span></td>
                    <td>${a.date}</td>
                    <td>${a.views}</td>
                    <td>
                        <button class="action-btn btn-edit" onclick="editArticle(${a.id})">Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteArticle(${a.id})">Hapus</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal() {
            document.getElementById('articleId').value = "";
            document.getElementById('articleImg').value = "";
            document.getElementById('articleTitle').value = "";
            document.getElementById('articleCategory').value = "NUTRITION";
            document.getElementById('articleContent').value = "";
            document.getElementById('articleDate').value = "05 Juni 2026";
            document.getElementById('modalTitle').innerText = "Tulis Artikel";
            document.getElementById('articleModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = "none";
        }

        function saveArticle() {
            const id = document.getElementById('articleId').value;
            const img = document.getElementById('articleImg').value || "https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=120";
            const title = document.getElementById('articleTitle').value;
            const category = document.getElementById('articleCategory').value;
            const content = document.getElementById('articleContent').value;
            const date = document.getElementById('articleDate').value || "05 Juni 2026";

            if (!title) return alert("Judul artikel wajib diisi!");
            if (!content) return alert("Isi artikel tidak boleh kosong!");

            let articles = getArticles();

            if (id) {
                articles = articles.map(a => a.id == id ? { ...a, title, category, content, date, img } : a);
            } else {
                const newId = articles.length > 0 ? Math.max(...articles.map(a => a.id)) + 1 : 1;
                articles.push({ id: newId, title, category, content, date, views: "0", img });
            }

            localStorage.setItem('wtools_articles', JSON.stringify(articles));
            closeModal();
            renderArticles();
        }

        function editArticle(id) {
            const a = getArticles().find(art => art.id == id);
            if (!a) return;

            document.getElementById('articleId').value = a.id;
            document.getElementById('articleImg').value = a.img;
            document.getElementById('articleTitle').value = a.title;
            document.getElementById('articleCategory').value = a.category;
            // Masukkan data konten yang tersimpan ke dalam textarea
            document.getElementById('articleContent').value = a.content || ""; 
            document.getElementById('articleDate').value = a.date;
            document.getElementById('modalTitle').innerText = "Edit Artikel";
            document.getElementById('articleModal').style.display = "flex";
        }

        function deleteArticle(id) {
            if (confirm("Apakah Anda yakin ingin menghapus artikel ini?")) {
                let articles = getArticles().filter(a => a.id != id);
                localStorage.setItem('wtools_articles', JSON.stringify(articles));
                renderArticles();
            }
        }

        document.getElementById('searchArticle').addEventListener('input', (e) => {
            renderArticles(e.target.value);
        });

        window.onload = () => {
            renderArticles();
        };
    </script>
