    <main class="main-content">
        <header class="header-admin">
            <h1 class="admin-title">Kelola Pengguna</h1>
            <div class="admin-profile">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">A</div>
                <span style="font-size: 14px; font-weight: 600;">Admin Okabe</span>
            </div>
        </header>

        <div class="admin-panel-card">
            <div class="panel-header">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <input type="text" id="searchUser" placeholder="Cari nama atau email..." style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white; width: 300px;">
                </div>
            </div>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Pelanggan</th>
                        <th>Email</th>
                        <th>No. Handphone</th>
                        <th>Tanggal Daftar</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const defaultUsers = [
            { id: 1, name: "Rafi Fernandito", email: "rafi.fernandito@email.com", phone: "+62 812-3456-7890", date: "01 Jan 2026", status: "Aktif", avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=50" },
            { id: 2, name: "Budi Santoso", email: "budi.s@email.com", phone: "+62 856-1122-3344", date: "15 Mar 2026", status: "Aktif", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=50" },
            { id: 3, name: "Andi Wijaya", email: "andi.wjy@email.com", phone: "+62 899-7766-5544", date: "20 Apr 2026", status: "Banned", avatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=50" }
        ];

        if (!localStorage.getItem('wtools_users')) {
            localStorage.setItem('wtools_users', JSON.stringify(defaultUsers));
        }

        function renderUsers() {
            const users = JSON.parse(localStorage.getItem('wtools_users'));
            const searchVal = document.getElementById('searchUser').value.toLowerCase();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";

            users.forEach(u => {
                if (searchVal && !u.name.toLowerCase().includes(searchVal) && !u.email.toLowerCase().includes(searchVal)) return;

                const tr = document.createElement('tr');
                
                const statusBadge = u.status === "Aktif" 
                    ? `<span style="color: #28a745; background: rgba(40,167,69,0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;">Aktif</span>`
                    : `<span style="color: #dc3545; background: rgba(220,53,69,0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;">Banned</span>`;

                const actionButton = u.status === "Aktif"
                    ? `<button class="action-btn btn-delete" onclick="toggleStatus(${u.id}, 'Banned')">Suspend</button>`
                    : `<button class="action-btn btn-edit" style="color: #28a745; background: rgba(40,167,69,0.1);" onclick="toggleStatus(${u.id}, 'Aktif')">Pulihkan</button>`;

                tr.innerHTML = `
                    <td style="font-weight: 600; display: flex; align-items: center; gap: 12px;">
                        <img src="${u.avatar}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                        ${u.name}
                    </td>
                    <td>${u.email}</td>
                    <td>${u.phone}</td>
                    <td>${u.date}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <button class="action-btn btn-edit" onclick="viewDetail('${u.name}')">Lihat Detail</button>
                        ${actionButton}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleStatus(id, newStatus) {
            let users = JSON.parse(localStorage.getItem('wtools_users'));
            users = users.map(u => u.id === id ? { ...u, status: newStatus } : u);
            localStorage.setItem('wtools_users', JSON.stringify(users));
            renderUsers();
        }

        function viewDetail(name) {
            alert("Membuka detail profil untuk: " + name);
        }

        document.getElementById('searchUser').addEventListener('input', renderUsers);

        window.onload = renderUsers;
    </script>
