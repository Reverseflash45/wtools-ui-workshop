<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Add Address</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/store.css">
</head>
<body>
    <div style="padding: 20px 20px 100px 20px;">
        <header class="page-header">
            <a href="addresses.html" style="font-size: 20px;">←</a>
            <h2 class="page-title">Add Address</h2>
        </header>

        <form action="addresses.html">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="form-control" placeholder="+62" required>
            </div>
            <div class="form-group">
                <label>Street Address</label>
                <textarea class="form-control" placeholder="Enter your street address" rows="3" style="resize: none;" required></textarea>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" class="form-control" placeholder="Enter city" required>
            </div>
            <div class="form-group">
                <label>Postal Code</label>
                <input type="text" class="form-control" placeholder="12345" required>
            </div>
            
            <div class="form-group">
                <label>Address Type</label>
                <div style="display: flex; gap: 12px; margin-top: 8px;">
                    <div style="flex: 1; padding: 12px; text-align: center; background-color: rgba(230, 0, 0, 0.1); border: 1px solid var(--primary); color: var(--primary); border-radius: 8px; font-size: 14px; font-weight: 600;">Home</div>
                    <div style="flex: 1; padding: 12px; text-align: center; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px;">Work</div>
                    <div style="flex: 1; padding: 12px; text-align: center; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px;">Other</div>
                </div>
            </div>
        </form>

        <div class="bottom-action-bar" style="justify-content: center;">
            <button class="btn btn-primary" style="width: 100%;" onclick="window.location.href='addresses.html'">Save Address</button>
        </div>
    </div>
</body>
</html>
