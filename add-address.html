<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Add Address</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            background-color: var(--bg-dark, #121212);
            color: var(--text-main, #ffffff);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 240px;
            background-color: var(--bg-card, #1e1e1e);
            border-right: 1px solid var(--border-color, #333);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary, #e60000);
            padding: 0 24px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted, #aaaaaa);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main, #ffffff);
        }
        .nav-item.active {
            background-color: rgba(230, 0, 0, 0.1);
            color: var(--primary, #e60000);
        }
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 40px;
            background-color: var(--bg-dark, #121212);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }
        .form-wrapper {
            width: 100%;
            max-width: 650px;
        }
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .btn-back {
            color: var(--text-main);
            background-color: var(--bg-card);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .page-title {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
        }
        .form-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-dark);
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        .type-selector {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }
        .type-btn {
            flex: 1;
            padding: 14px;
            text-align: center;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        .type-btn.active {
            background-color: rgba(230, 0, 0, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-submit-container {
            margin-top: 40px;
            text-align: right;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }
        .btn-primary {
            padding: 14px 32px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </a>
            <a href="store-trending.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <span>Trending</span>
            </a>
            <a href="category-goals.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                <span>Categories</span>
            </a>
            <a href="wishlist.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                <span>Wishlist</span>
            </a>
            <a href="transaction-history.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span>Histori Transaksi</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="form-wrapper">
            <header class="page-header">
                <a href="addresses.html" class="btn-back">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <h2 class="page-title">Tambah Alamat Baru</h2>
            </header>

            <div class="form-card">
                <form id="addAddressForm" onsubmit="handleSaveAddress(event)">
                    <div class="form-group">
                        <label>Nama Penerima</label>
                        <input type="text" class="form-control" placeholder="Masukkan nama lengkap" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Nomor Telepon</label>
                        <input type="tel" class="form-control" placeholder="+62 8xx xxxx xxxx" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Alamat Lengkap</label>
                        <textarea class="form-control" placeholder="Nama jalan, gedung, no. rumah" rows="3" style="resize: none;" required></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 16px;">
                        <div class="form-group" style="flex: 2;">
                            <label>Kota / Kabupaten</label>
                            <input type="text" class="form-control" placeholder="Masukkan kota" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Kode Pos</label>
                            <input type="text" class="form-control" placeholder="12345" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Tandai Sebagai</label>
                        <div class="type-selector">
                            <div class="type-btn active" onclick="selectType(this)">Rumah</div>
                            <div class="type-btn" onclick="selectType(this)">Kantor</div>
                            <div class="type-btn" onclick="selectType(this)">Lainnya</div>
                        </div>
                    </div>

                    <div class="btn-submit-container">
                        <button type="submit" class="btn-primary">Simpan Alamat</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        function selectType(element) {
            const buttons = document.querySelectorAll('.type-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function handleSaveAddress(e) {
            e.preventDefault();
            window.location.href = 'addresses.html';
        }
    </script>
</body>
</html>
