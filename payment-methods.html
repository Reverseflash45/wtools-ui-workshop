<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Payment Methods</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body { background-color: var(--bg-dark, #121212); color: var(--text-main, #ffffff); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background-color: var(--bg-card, #1e1e1e); border-right: 1px solid var(--border-color, #333); display: flex; flex-direction: column; padding: 24px 0; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { font-size: 24px; font-weight: 800; color: var(--primary, #e60000); padding: 0 24px; margin-bottom: 40px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; font-size: 15px; font-weight: 600; border-radius: 8px; transition: all 0.2s ease; }
        .nav-item:hover, .nav-item.active { background-color: rgba(230, 0, 0, 0.1); color: var(--primary); }
        .main-content { margin-left: 240px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .payment-wrapper { width: 100%; max-width: 800px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .btn-back { color: var(--text-main); background-color: var(--bg-card); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border-color); text-decoration: none; }
        
        .btn-primary { padding: 12px 24px; font-weight: 700; font-size: 14px; cursor: pointer; border: none; border-radius: 8px; background-color: var(--primary); color: white; display: inline-block; }
        
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .payment-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; display: flex; align-items: center; gap: 16px; position: relative; transition: border-color 0.2s; }
        .payment-card:hover { border-color: var(--primary); }
        .payment-card.active { border-color: var(--primary); background: rgba(230,0,0,0.05); }
        .payment-icon { font-size: 32px; background: var(--bg-dark); padding: 12px; border-radius: 8px; }
        .payment-info h4 { margin: 0 0 4px 0; font-size: 16px; }
        .payment-info p { margin: 0; font-size: 13px; color: var(--text-muted); }
        
        .action-btns { position: absolute; right: 24px; display: flex; gap: 8px; }
        .action-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { background: var(--bg-dark); color: white; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></a>
            <a href="profile.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg><span>Profile</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="payment-wrapper">
            <header class="page-header">
                <div class="header-left">
                    <a href="profile.html" class="btn-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
                    <h2 style="margin:0; font-size: 24px; font-weight: 800;">Payment Methods</h2>
                </div>
                <button class="btn-primary">+ Add New Method</button>
            </header>

            <div class="payment-grid">
                <div class="payment-card active">
                    <div class="payment-icon">💳</div>
                    <div class="payment-info">
                        <h4>**** **** **** 1289</h4>
                        <p>Valid thru 12/27 (Default)</p>
                    </div>
                    <div class="action-btns">
                        <button class="action-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                    </div>
                </div>

                <div class="payment-card">
                    <div class="payment-icon">💳</div>
                    <div class="payment-info">
                        <h4>**** **** **** 5678</h4>
                        <p>Valid thru 08/28</p>
                    </div>
                    <div class="action-btns">
                        <button class="action-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                    </div>
                </div>

                <div class="payment-card">
                    <div class="payment-icon">📱</div>
                    <div class="payment-info">
                        <h4>PayPal Account</h4>
                        <p>rafi.fernandito@email.com</p>
                    </div>
                    <div class="action-btns">
                        <button class="action-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
