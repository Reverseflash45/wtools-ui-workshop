<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Payment Method</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/store.css">
</head>
<body>
    <div class="store-container">
        <header class="page-header">
            <a href="checkout-delivery.html" style="font-size: 20px;">←</a>
            <h2 class="page-title">Payment Method</h2>
        </header>

        <div class="checkout-step">
            <span class="active">1 Cart</span>
            <span>—</span>
            <span class="active">2 Delivery</span>
            <span>—</span>
            <span class="active">3 Payment</span>
        </div>

        <h3 class="section-title">Choose Payment Method</h3>
        
        <div class="payment-option">
            <div class="payment-icon">💵</div>
            <div style="flex: 1;">
                <h4 style="font-size: 14px; margin-bottom: 4px;">Cash on Delivery</h4>
                <p style="font-size: 12px; color: var(--text-muted);">Pay when your order arrives</p>
            </div>
            <input type="radio" name="payment">
        </div>

        <div class="payment-option">
            <div class="payment-icon">🏦</div>
            <div style="flex: 1;">
                <h4 style="font-size: 14px; margin-bottom: 4px;">Bank Transfer</h4>
                <p style="font-size: 12px; color: var(--text-muted);">Transfer to our bank account</p>
            </div>
            <input type="radio" name="payment">
        </div>

        <div class="payment-option">
            <div class="payment-icon">📱</div>
            <div style="flex: 1;">
                <h4 style="font-size: 14px; margin-bottom: 4px;">e-Wallet</h4>
                <p style="font-size: 12px; color: var(--text-muted);">GoPay, OVO, DANA & more</p>
            </div>
            <input type="radio" name="payment">
        </div>

        <div class="payment-option active">
            <div class="payment-icon">💳</div>
            <div style="flex: 1;">
                <h4 style="font-size: 14px; margin-bottom: 4px;">Credit/Debit Card</h4>
                <p style="font-size: 12px; color: var(--text-muted);">Visa, Mastercard, JCB</p>
            </div>
            <input type="radio" name="payment" checked>
        </div>
    </div>

    <div class="bottom-action-bar" style="justify-content: center;">
        <button class="btn btn-primary" style="width: 100%;" onclick="window.location.href='checkout-summary.html'">Confirm Payment</button>
    </div>
</body>
</html>
