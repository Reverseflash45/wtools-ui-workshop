<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Payment Method</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            background-color: var(--bg-dark, #121212);
            color: var(--text-main, #ffffff);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 240px;
            background-color: var(--bg-card, #1e1e1e);
            border-right: 1px solid var(--border-color, #333);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
        }
        .sidebar-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary, #e60000);
            padding: 0 24px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted, #aaaaaa);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
        }
        .nav-item:hover, .nav-item.active {
            background-color: rgba(230, 0, 0, 0.1);
            color: var(--primary, #e60000);
        }
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .checkout-wrapper {
            width: 100%;
            max-width: 700px;
        }
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .btn-back {
            color: var(--text-main);
            background-color: var(--bg-card);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-decoration: none;
        }
        .checkout-step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            font-weight: 700;
            color: var(--text-muted);
        }
        .checkout-step .active { color: var(--primary); }
        .section-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
        
        .payment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .payment-option {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .payment-option.active {
            border-color: var(--primary);
            background-color: rgba(230,0,0,0.05);
        }
        .payment-icon {
            font-size: 28px;
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            font-weight: 800;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 40px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Home</span></a>
            <a href="store-trending.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg><span>Store</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="checkout-wrapper">
            <header class="page-header">
                <a href="checkout-delivery.html" class="btn-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
                <h2 style="margin:0; font-size: 24px; font-weight: 800;">Payment Method</h2>
            </header>

            <div class="checkout-step">
                <span class="active">1 Cart</span><span>—</span>
                <span class="active">2 Delivery</span><span>—</span>
                <span class="active">3 Payment</span>
            </div>

            <h3 class="section-title">Choose Payment Method</h3>
            
            <div class="payment-grid">
                <div class="payment-option" onclick="selectPayment(this)">
                    <div class="payment-icon">💵</div>
                    <div style="flex: 1;">
                        <h4 style="margin: 0 0 8px 0;">Cash on Delivery</h4>
                        <p style="margin: 0; color: var(--text-muted); font-size: 13px;">Pay when order arrives</p>
                    </div>
                </div>

                <div class="payment-option" onclick="selectPayment(this)">
                    <div class="payment-icon">🏦</div>
                    <div style="flex: 1;">
                        <h4 style="margin: 0 0 8px 0;">Bank Transfer</h4>
                        <p style="margin: 0; color: var(--text-muted); font-size: 13px;">Transfer to bank account</p>
                    </div>
                </div>

                <div class="payment-option" onclick="selectPayment(this)">
                    <div class="payment-icon">📱</div>
                    <div style="flex: 1;">
                        <h4 style="margin: 0 0 8px 0;">e-Wallet</h4>
                        <p style="margin: 0; color: var(--text-muted); font-size: 13px;">GoPay, OVO, DANA</p>
                    </div>
                </div>

                <div class="payment-option active" onclick="selectPayment(this)">
                    <div class="payment-icon">💳</div>
                    <div style="flex: 1;">
                        <h4 style="margin: 0 0 8px 0;">Credit/Debit Card</h4>
                        <p style="margin: 0; color: var(--text-muted); font-size: 13px;">Visa, Mastercard, JCB</p>
                    </div>
                </div>
            </div>

            <button class="btn-primary" onclick="window.location.href='checkout-summary.html'">Review Order Summary</button>
        </div>
    </main>

    <script>
        function selectPayment(el) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
