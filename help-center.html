<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Help Center</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/store.css">
    <link rel="stylesheet" href="assets/css/misc.css">
</head>
<body>
    <div style="padding: 20px;">
        <header class="page-header">
            <a href="profile.html" style="font-size: 20px;">←</a>
            <h2 class="page-title">Help Center</h2>
        </header>

        <div class="search-bar" style="margin-bottom: 24px;">
            <span>🔍</span>
            <input type="text" placeholder="Search for help...">
        </div>

        <div class="faq-item">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 18px; color: var(--primary);">📦</span>
                <span>Orders</span>
            </div>
            <span style="color: var(--text-muted);">›</span>
        </div>

        <div class="faq-item">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 18px; color: var(--primary);">💳</span>
                <span>Payment</span>
            </div>
            <span style="color: var(--text-muted);">›</span>
        </div>

        <div class="faq-item">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 18px; color: var(--primary);">🚚</span>
                <span>Delivery</span>
            </div>
            <span style="color: var(--text-muted);">›</span>
        </div>

        <div class="faq-item">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 18px; color: var(--primary);">↩️</span>
                <span>Returns</span>
            </div>
            <span style="color: var(--text-muted);">›</span>
        </div>

        <div class="faq-item">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 18px; color: var(--primary);">👤</span>
                <span>Account</span>
            </div>
            <span style="color: var(--text-muted);">›</span>
        </div>

        <div style="background-color: var(--bg-card); padding: 24px; border-radius: 12px; text-align: center; margin-top: 32px;">
            <div style="font-size: 32px; margin-bottom: 12px;">🎧</div>
            <h3 style="font-size: 16px; margin-bottom: 8px;">Still Need Help?</h3>
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 16px;">Our support team is available 24/7</p>
            <button class="btn btn-primary" onclick="window.location.href='contact-support.html'">Contact Support</button>
        </div>
    </div>
</body>
</html>
