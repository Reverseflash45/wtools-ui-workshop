<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Help Center</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            background-color: var(--bg-dark, #121212);
            color: var(--text-main, #ffffff);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 240px;
            background-color: var(--bg-card, #1e1e1e);
            border-right: 1px solid var(--border-color, #333);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
        }
        .sidebar-logo { font-size: 24px; font-weight: 800; color: var(--primary); padding: 0 24px; margin-bottom: 40px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; font-weight: 600; border-radius: 8px; }
        .nav-item.active { background-color: rgba(230, 0, 0, 0.1); color: var(--primary); }
        .main-content { margin-left: 240px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .help-wrapper { width: 100%; max-width: 800px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
        .btn-back { color: var(--text-main); background-color: var(--bg-card); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border-color); text-decoration: none; }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 40px;
        }
        .search-box input {
            background: transparent; border: none; color: white; width: 100%; font-size: 16px; margin-left: 16px; outline: none;
        }
        
        .faq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 48px; }
        .faq-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px;
            display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s;
        }
        .faq-card:hover { border-color: var(--primary); transform: translateX(4px); }
        .faq-left { display: flex; align-items: center; gap: 16px; }
        .faq-icon { font-size: 24px; color: var(--primary); }
        .faq-title { font-size: 16px; font-weight: 700; margin: 0; }
        
        .support-banner {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(230,0,0,0.1) 100%);
            border: 1px solid var(--border-color); border-radius: 16px; padding: 40px; text-align: center;
        }
        .btn-primary { padding: 14px 32px; font-weight: 800; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; margin-top: 24px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></a>
            <a href="profile.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg><span>Profile</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="help-wrapper">
            <header class="page-header">
                <a href="profile.html" class="btn-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
                <h2 style="margin:0; font-size: 24px; font-weight: 800;">Help Center</h2>
            </header>

            <div class="search-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search for help, topics, or FAQs...">
            </div>

            <div class="faq-grid">
                <div class="faq-card">
                    <div class="faq-left">
                        <span class="faq-icon">📦</span>
                        <h3 class="faq-title">Orders & Tracking</h3>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
                
                <div class="faq-card">
                    <div class="faq-left">
                        <span class="faq-icon">💳</span>
                        <h3 class="faq-title">Payment Methods</h3>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <div class="faq-card">
                    <div class="faq-left">
                        <span class="faq-icon">🚚</span>
                        <h3 class="faq-title">Delivery Info</h3>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <div class="faq-card">
                    <div class="faq-left">
                        <span class="faq-icon">↩️</span>
                        <h3 class="faq-title">Returns & Refunds</h3>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            </div>

            <div class="support-banner">
                <div style="font-size: 40px; margin-bottom: 16px;">🎧</div>
                <h3 style="font-size: 24px; margin: 0 0 12px 0; font-weight: 800;">Still Need Help?</h3>
                <p style="color: var(--text-muted); margin: 0; font-size: 15px;">Our support team is available 24/7 to resolve your issues quickly.</p>
                <button class="btn-primary" onclick="window.location.href='contact-support.html'">Contact Support</button>
            </div>
        </div>
    </main>
</body>
</html>
