    <main class="main-content">
        <header class="header-admin">
            <h1 class="admin-title">Kelola Produk</h1>
            <div class="admin-profile">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">A</div>
                <span style="font-size: 14px; font-weight: 600;">Admin Okabe</span>
            </div>
        </header>

        <div class="admin-panel-card">
            <div class="panel-header">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <input type="text" id="searchProduct" placeholder="Cari produk..." style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white; width: 300px;">
                </div>
                <button class="btn-add" onclick="openModal()">+ Tambah Produk</button>
            </div>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nama Produk</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top: 0; margin-bottom: 20px;">Tambah Produk</h3>
            <input type="hidden" id="productId">
            <div class="form-group">
                <label>URL Foto Produk</label>
                <input type="text" id="productImg" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
                <label>Nama Produk</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="productCategory">
                    <option value="Chest & Arms">Chest & Arms</option>
                    <option value="Core & Abs">Core & Abs</option>
                    <option value="Legs & Glutes">Legs & Glutes</option>
                    <option value="Nutrition">Nutrition</option>
                </select>
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" id="productPrice" required>
            </div>
            <div class="form-group">
                <label>Stok</label>
                <input type="number" id="productStock" required>
            </div>
            <div class="modal-actions">
                <button class="btn-add" style="background: #6c757d;" onclick="closeModal()">Batal</button>
                <button class="btn-add" onclick="saveProduct()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const initialProducts = [
            { id: 1, name: "Adjustable Dumbbells Set", category: "Chest & Arms", price: 899000, stock: 45, img: "https://images.unsplash.com/photo-1638536532686-d610adfc8e5c?w=100" },
            { id: 2, name: "Premium Yoga Mat", category: "Core & Abs", price: 180000, stock: 120, img: "https://images.unsplash.com/photo-1592432678016-e910b452f9a2?w=100" },
            { id: 3, name: "Squat Pad Pro", category: "Legs & Glutes", price: 89000, stock: 8, img: "https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?w=100" },
            { id: 4, name: "Whey Protein Isolate", category: "Nutrition", price: 850000, stock: 0, img: "https://images.unsplash.com/photo-1579758629938-03607ccdbaba?w=100" }
        ];

        if (!localStorage.getItem('wtools_products')) {
            localStorage.setItem('wtools_products', JSON.stringify(initialProducts));
        }

        function getProducts() {
            return JSON.parse(localStorage.getItem('wtools_products'));
        }

        function renderProducts(filterText = "") {
            const products = getProducts();
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = "";

            const filtered = products.filter(p => p.name.toLowerCase().includes(filterText.toLowerCase()));

            filtered.forEach(p => {
                const tr = document.createElement('tr');
                const stockDisplay = p.stock == 0 ? `0 <span style="color: #dc3545; font-size: 10px; margin-left: 4px;">(Habis)</span>` : p.stock;
                
                tr.innerHTML = `
                    <td><img src="${p.img}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;" onerror="this.src='https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=100'"></td>
                    <td style="font-weight: 600;">${p.name}</td>
                    <td>${p.category}</td>
                    <td style="color: var(--primary); font-weight: bold;">Rp ${p.price.toLocaleString('id-ID')}</td>
                    <td>${stockDisplay}</td>
                    <td>
                        <button class="action-btn btn-edit" onclick="editProduct(${p.id})">Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteProduct(${p.id})">Hapus</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal() {
            document.getElementById('productId').value = "";
            document.getElementById('productImg').value = "";
            document.getElementById('productName').value = "";
            document.getElementById('productCategory').value = "Chest & Arms";
            document.getElementById('productPrice').value = "";
            document.getElementById('productStock').value = "";
            document.getElementById('modalTitle').innerText = "Tambah Produk";
            document.getElementById('productModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('productModal').style.display = "none";
        }

        function saveProduct() {
            const id = document.getElementById('productId').value;
            const img = document.getElementById('productImg').value || "https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=100";
            const name = document.getElementById('productName').value;
            const category = document.getElementById('productCategory').value;
            const price = parseInt(document.getElementById('productPrice').value) || 0;
            const stock = parseInt(document.getElementById('productStock').value) || 0;

            if (!name) return alert("Nama produk wajib diisi!");

            let products = getProducts();

            if (id) {
                products = products.map(p => p.id == id ? { ...p, name, category, price, stock, img } : p);
            } else {
                const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
                products.push({ id: newId, name, category, price, stock, img });
            }

            localStorage.setItem('wtools_products', JSON.stringify(products));
            closeModal();
            renderProducts();
        }

        function editProduct(id) {
            const p = getProducts().find(prod => prod.id == id);
            if (!p) return;

            document.getElementById('productId').value = p.id;
            document.getElementById('productImg').value = p.img;
            document.getElementById('productName').value = p.name;
            document.getElementById('productCategory').value = p.category;
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productStock').value = p.stock;
            document.getElementById('modalTitle').innerText = "Edit Produk";
            document.getElementById('productModal').style.display = "flex";
        }

        function deleteProduct(id) {
            if (confirm("Apakah Anda yakin ingin menghapus produk ini?")) {
                let products = getProducts().filter(p => p.id != id);
                localStorage.setItem('wtools_products', JSON.stringify(products));
                renderProducts();
            }
        }

        document.getElementById('searchProduct').addEventListener('input', (e) => {
            renderProducts(e.target.value);
        });

        window.onload = () => {
            renderProducts();
        };
    </script>
