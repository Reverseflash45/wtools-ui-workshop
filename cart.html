<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Cart</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/home.css">
    <link rel="stylesheet" href="assets/css/store.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </a>
            <a href="store-trending.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <span>Trending</span>
            </a>
            <a href="category-goals.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                <span>Categories</span>
            </a>
            <a href="wishlist.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                <span>Wishlist</span>
            </a>
            <a href="profile.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="store-container" style="padding: 32px; max-width: 900px; margin: 0 auto;">
            <header class="page-header" style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
                <a href="product-detail.html" style="color: var(--text-main); display: flex; align-items: center; justify-content: center; background-color: var(--bg-card); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); text-decoration: none;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <h2 class="page-title" style="margin: 0; font-size: 24px; font-weight: 700;">Cart</h2>
            </header>

            <div class="cart-item" style="display: flex; gap: 16px; background-color: var(--bg-card); padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border-color); align-items: center;">
                <img src="https://images.unsplash.com/photo-1638536532686-d610adfc8e5c?w=150&auto=format&fit=crop" alt="Adjustable Dumbbells" style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-color);">
                <div class="cart-item-info" style="flex: 1;">
                    <h4 class="cart-item-title" style="font-size: 15px; font-weight: 700; margin: 0 0 4px 0;">Adjustable Dumbbells Set</h4>
                    <p class="cart-item-price" style="color: var(--primary); font-size: 14px; font-weight: 700; margin: 0 0 12px 0;">Rp 899.000</p>
                    <div class="cart-qty-control" style="display: flex; align-items: center; gap: 12px;">
                        <button class="cart-qty-btn">-</button>
                        <span style="font-size: 14px; font-weight: bold; min-width: 16px; text-align: center;">1</span>
                        <button class="cart-qty-btn">+</button>
                    </div>
                </div>
                <button style="background: none; border: none; color: var(--text-muted); padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>

            <div class="cart-item" style="display: flex; gap: 16px; background-color: var(--bg-card); padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border-color); align-items: center;">
                <img src="https://images.unsplash.com/photo-1617348480549-b66a4f9a03b3?w=150&auto=format&fit=crop" alt="Training Gloves" style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-color);">
                <div class="cart-item-info" style="flex: 1;">
                    <h4 class="cart-item-title" style="font-size: 15px; font-weight: 700; margin: 0 0 4px 0;">Training Gloves Pro</h4>
                    <p class="cart-item-price" style="color: var(--primary); font-size: 14px; font-weight: 700; margin: 0 0 12px 0;">Rp 125.000</p>
                    <div class="cart-qty-control" style="display: flex; align-items: center; gap: 12px;">
                        <button class="cart-qty-btn">-</button>
                        <span style="font-size: 14px; font-weight: bold; min-width: 16px; text-align: center;">2</span>
                        <button class="cart-qty-btn">+</button>
                    </div>
                </div>
                <button style="background: none; border: none; color: var(--text-muted); padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>

            <h3 class="section-title" style="margin-top: 40px; font-size: 18px; font-weight: 700; margin-bottom: 16px;">Order Summary</h3>
            <div class="order-summary-box" style="background-color: var(--bg-card); border-radius: 12px; padding: 24px; border: 1px solid var(--border-color);">
                <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 14px; color: var(--text-muted);">
                    <span>Subtotal</span>
                    <span style="color: var(--text-main); font-weight: 600;">Rp 1.149.000</span>
                </div>
                <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: var(--text-muted);">
                    <span>Shipping Fee</span>
                    <span style="color: var(--text-main); font-weight: 600;">Rp 40.000</span>
                </div>
                <div class="summary-row total" style="display: flex; justify-content: space-between; font-weight: 700; color: var(--text-main); font-size: 16px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                    <span>Total</span>
                    <span style="color: var(--primary); font-size: 18px; font-weight: 800;">Rp 1.189.000</span>
                </div>
            </div>
        </div>

        <div class="bottom-action-bar" style="max-width: calc(100% - 240px); left: 240px; display: flex; justify-content: center;">
            <button class="btn btn-primary" style="width: 100%; max-width: 400px; padding: 16px; font-weight: 700;" onclick="window.location.href='checkout-delivery.html'">Proceed to Checkout</button>
        </div>
    </main>

</body>
</html>
