<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/global.css">

</head>
<body>
    <div style="padding: 20px;">
        <header class="page-header" style="display: flex; align-items: center; justify-content: space-between;">
            <a href="home.html" style="font-size: 20px;">←</a>
            <h2 style="font-size: 18px; font-weight: 600;">Search</h2>
            <div style="width: 20px;"></div>
        </header>

        <div class="search-bar" style="margin-bottom: 24px;">
            <span>🔍</span>

            </div>
            <h2 style="font-size: 20px; margin-bottom: 12px; color: var(--primary);">No results found</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 32px;">Try searching another keyword.</p>
            <button class="btn btn-primary" style="width: 80%;" onclick="window.location.href='home.html'">Back to Home</button>
