<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Search</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body { background-color: var(--bg-dark, #121212); color: var(--text-main, #ffffff); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background-color: var(--bg-card, #1e1e1e); border-right: 1px solid var(--border-color, #333); display: flex; flex-direction: column; padding: 24px 0; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { font-size: 24px; font-weight: 800; color: var(--primary, #e60000); padding: 0 24px; margin-bottom: 40px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; font-size: 15px; font-weight: 600; border-radius: 8px; transition: all 0.2s ease; }
        .nav-item:hover, .nav-item.active { background-color: rgba(230, 0, 0, 0.1); color: var(--primary); }
        .main-content { margin-left: 240px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .search-wrapper { width: 100%; max-width: 800px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
        .btn-back { color: var(--text-main); background-color: var(--bg-card); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border-color); text-decoration: none; }
        
        .search-bar-large { display: flex; align-items: center; background: var(--bg-card); border: 2px solid var(--primary); padding: 16px 24px; border-radius: 12px; margin-bottom: 60px; box-shadow: 0 10px 30px rgba(230,0,0,0.1); }
        .search-bar-large input { background: transparent; border: none; color: white; width: 100%; font-size: 18px; margin-left: 16px; outline: none; font-weight: 600; }
        
        .empty-state { text-align: center; padding: 60px 0; }
        .empty-icon { font-size: 64px; margin-bottom: 24px; opacity: 0.8; }
        .empty-title { font-size: 24px; font-weight: 800; margin: 0 0 12px 0; color: var(--primary); }
        .empty-desc { font-size: 15px; color: var(--text-muted); margin: 0 0 32px 0; }
        .btn-primary { padding: 14px 32px; font-weight: 800; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS</div>
        <nav class="sidebar-nav">
            <a href="home.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Home</span></a>
            <a href="store-trending.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg><span>Store</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="search-wrapper">
            <header class="page-header">
                <a href="home.html" class="btn-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
                <h2 style="margin:0; font-size: 24px; font-weight: 800;">Global Search</h2>
            </header>

            <div class="search-bar-large">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" value="zxcasdqwe" autofocus>
            </div>

            <div class="empty-state">
                <div class="empty-icon">🔍</div>
                <h2 class="empty-title">No results found</h2>
                <p class="empty-desc">We couldn't find anything matching "zxcasdqwe".<br>Try adjusting your search or use different keywords.</p>
                <button class="btn-primary" onclick="window.location.href='home.html'">Back to Home</button>
            </div>
        </div>
    </main>
</body>
</html>
