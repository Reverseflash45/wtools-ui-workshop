<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Forgot Password</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <main class="auth-container">
        <a href="login.html" class="back-btn">←</a>

        <h2 style="font-size: 24px; margin-bottom: 8px;">Forgot Password</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 32px;">Enter your email to receive reset instructions</p>

        <form action="otp-verification.html">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" placeholder="yourname@example.com" required>
            </div>

            <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </form>
    </main>
</body>
</html>
