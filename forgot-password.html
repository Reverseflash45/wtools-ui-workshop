<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS - Forgot Password</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            background-color: var(--bg-dark, #121212);
            color: var(--text-main, #ffffff);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?w=1000');
            background-size: cover;
            background-position: center;
        }
        .auth-card {
            background-color: var(--bg-card, #1e1e1e);
            border: 1px solid var(--border-color, #333);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
            position: relative;
        }
        .btn-back-auth {
            position: absolute;
            top: 24px;
            left: 24px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            transition: background 0.2s, color 0.2s;
        }
        .btn-back-auth:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .auth-header { text-align: center; margin-bottom: 40px; margin-top: 16px; }
        .auth-header h2 { font-size: 28px; font-weight: 800; margin: 0 0 12px 0; }
        .auth-header p { font-size: 15px; color: var(--text-muted); margin: 0; line-height: 1.6; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--bg-dark); color: white; font-size: 15px; box-sizing: border-box; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 16px; font-weight: 800; font-size: 15px; background-color: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <main class="auth-card">
        <a href="login.html" class="btn-back-auth">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>

        <div class="auth-header">
            <h2>Forgot Password</h2>
            <p>Enter your registered email address to receive reset instructions and recover your account.</p>
        </div>

        <form action="otp-verification.html">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" placeholder="yourname@example.com" required>
            </div>
            <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>
    </main>
</body>
</html>
