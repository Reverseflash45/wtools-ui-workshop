    <main class="main-content">
        <header class="header-admin">
            <h1 class="admin-title">Kelola Transaksi</h1>
            <div class="admin-profile">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">A</div>
                <span style="font-size: 14px; font-weight: 600;">Admin Okabe</span>
            </div>
        </header>

        <div class="admin-panel-card">
            <div class="panel-header">
                <div style="display: flex; gap: 16px; align-items: center;">
                    <input type="text" id="searchOrder" placeholder="Cari ID Pesanan..." style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white; width: 250px;">
                    <select id="filterStatus" style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white;">
                        <option value="All">Semua Status</option>
                        <option value="Processing">Processing</option>
                        <option value="Shipped">Shipped</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID Pesanan</th>
                        <th>Pelanggan</th>
                        <th>Tanggal Pembelian</th>
                        <th>Metode Bayar</th>
                        <th>Total Harga</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="transactionTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const defaultTransactions = [
            { id: "#ORD-2026-001", customer: "Rafi Fernandito", date: "12 Mei 2026, 14:30", method: "Credit Card", total: 1191000, status: "Shipped" },
            { id: "#ORD-2026-002", customer: "Budi Santoso", date: "12 Mei 2026, 09:15", method: "Bank Transfer", total: 450000, status: "Completed" },
            { id: "#ORD-2026-003", customer: "Andi Wijaya", date: "11 Mei 2026, 16:45", method: "e-Wallet", total: 2450000, status: "Processing" }
        ];

        if (!localStorage.getItem('wtools_transactions')) {
            localStorage.setItem('wtools_transactions', JSON.stringify(defaultTransactions));
        }

        function getStyleByStatus(status) {
            if (status === "Processing") return "background: rgba(253,126,20,0.1); color: #fd7e14; border: 1px solid #fd7e14;";
            if (status === "Shipped") return "background: rgba(0,123,255,0.1); color: #007bff; border: 1px solid #007bff;";
            if (status === "Completed") return "background: rgba(40,167,69,0.1); color: #28a745; border: 1px solid #28a745;";
            return "background: rgba(220,53,69,0.1); color: #dc3545; border: 1px solid #dc3545;";
        }

        function renderTransactions() {
            const transactions = JSON.parse(localStorage.getItem('wtools_transactions'));
            const searchVal = document.getElementById('searchOrder').value.toLowerCase();
            const filterVal = document.getElementById('filterStatus').value;
            const tbody = document.getElementById('transactionTableBody');
            tbody.innerHTML = "";

            transactions.forEach(t => {
                if (searchVal && !t.id.toLowerCase().includes(searchVal)) return;
                if (filterVal !== "All" && t.status !== filterVal) return;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 600;">${t.id}</td>
                    <td>${t.customer}</td>
                    <td>${t.date}</td>
                    <td>${t.method}</td>
                    <td style="color: var(--primary); font-weight: bold;">Rp ${t.total.toLocaleString('id-ID')}</td>
                    <td>
                        <select onchange="updateStatus('${t.id}', this.value)" style="padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 12px; outline: none; ${getStyleByStatus(t.status)}">
                            <option value="Processing" ${t.status === "Processing" ? "selected" : ""}>Processing</option>
                            <option value="Shipped" ${t.status === "Shipped" ? "selected" : ""}>Shipped</option>
                            <option value="Completed" ${t.status === "Completed" ? "selected" : ""}>Completed</option>
                            <option value="Cancelled" ${t.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
                        </select>
                    </td>
                    <td>
                        <button class="action-btn btn-edit" onclick="printReceipt('${t.id}')">Cetak Resi</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStatus(id, newStatus) {
            let transactions = JSON.parse(localStorage.getItem('wtools_transactions'));
            transactions = transactions.map(t => t.id === id ? { ...t, status: newStatus } : t);
            localStorage.setItem('wtools_transactions', JSON.stringify(transactions));
            renderTransactions();
        }

        function printReceipt(id) {
            alert("Mencetak Resi untuk " + id);
        }

        document.getElementById('searchOrder').addEventListener('input', renderTransactions);
        document.getElementById('filterStatus').addEventListener('change', renderTransactions);

        window.onload = renderTransactions;
    </script>
