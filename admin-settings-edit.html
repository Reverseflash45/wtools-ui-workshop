<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTOOLS Admin - Edit Profile</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background-color: var(--bg-card, #121212); border-right: 1px solid var(--border-color, #333); display: flex; flex-direction: column; padding: 24px 0; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { font-size: 20px; font-weight: 800; color: var(--primary, #e60000); padding: 0 24px; margin-bottom: 40px; letter-spacing: 1px; }
        .sidebar-logo span { color: white; font-weight: 400; font-size: 14px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 4px; padding: 0 16px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted, #aaa); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: rgba(230, 0, 0, 0.1); color: var(--primary); }
        .main-content { margin-left: 240px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .form-wrapper { width: 100%; max-width: 600px; }
        
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #333; }
        .btn-back { color: white; background: #121212; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #333; text-decoration: none; }
        .page-title { font-size: 24px; font-weight: 800; margin: 0; }
        
        .admin-form-card { background: #121212; border: 1px solid #333; border-radius: 12px; padding: 32px; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 14px 16px; border-radius: 8px; border: 1px solid #333; background: #0a0a0a; color: white; font-size: 14px; box-sizing: border-box; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .btn-save { width: 100%; padding: 16px; font-weight: 800; font-size: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 16px; }
    </style>
    <script src="assets/js/auth.js"></script>
    <script>checkAdminSession();</script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">WTOOLS <br><span>ADMIN PORTAL</span></div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
            <a href="admin-products.html" class="nav-item">Products</a>
            <a href="admin-articles.html" class="nav-item">Articles</a>
            <a href="admin-users.html" class="nav-item">Users</a>
            <a href="admin-orders.html" class="nav-item">Orders</a>
            <div style="height: 1px; background: #333; margin: 12px 0;"></div>
            <a href="admin-chat-customer.html" class="nav-item">Customer Chat</a>
            <a href="admin-chat-internal.html" class="nav-item">Internal Chat</a>
            <div style="height: 1px; background: #333; margin: 12px 0;"></div>
            <a href="admin-settings.html" class="nav-item active">Settings</a>
            <a href="#" class="nav-item" onclick="executeLogout()" style="color: #ff4444;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="form-wrapper">
            <header class="page-header">
                <a href="admin-settings.html" class="btn-back">←</a>
                <h2 class="page-title">Ubah Profil & Keamanan</h2>
            </header>

            <div class="admin-form-card">
                <form action="admin-settings.html">
                    <h3 style="font-size: 16px; margin: 0 0 24px 0; border-bottom: 1px solid #333; padding-bottom: 12px;">Informasi Pribadi</h3>
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" class="form-control" value="Administrator Utama">
                    </div>
                    <div class="form-group">
                        <label>Email Operasional</label>
                        <input type="email" class="form-control" value="admin@wtools.com">
                    </div>

                    <h3 style="font-size: 16px; margin: 40px 0 24px 0; border-bottom: 1px solid #333; padding-bottom: 12px;">Ubah Kata Sandi</h3>
                    <div class="form-group">
                        <label>Password Lama</label>
                        <input type="password" class="form-control" placeholder="Masukkan password saat ini">
                    </div>
                    <div class="form-group">
                        <label>Password Baru</label>
                        <input type="password" class="form-control" placeholder="Masukkan password baru">
                    </div>

                    <button type="submit" class="btn-save">Simpan Perubahan</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
